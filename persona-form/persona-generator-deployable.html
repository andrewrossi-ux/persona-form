<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Persona .md Generator — DroneSense</title>
<meta name="description" content="Generate persona markdown files optimized for Claude Code context and AI-assisted development.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧩</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   DroneSense Design System — Subset
   ============================================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --surface-base:#060609;--surface-subtle:#0b0b10;--surface-medium:#0f1016;
  --surface-emphasis:#14151c;--surface-strong:#181a22;
  --border-subtle:#1d2028;--border-medium:#21252e;--border-emphasis:#262b34;
  --border-strong:#323945;--border-data-entry:#3e4655;--border-ui:#636f87;
  --text-primary:#fcfcfc;--text-secondary:#b8b8b8;--text-tertiary:#9a9a9a;
  --text-placeholder:#9a9a9a;
  --brand:#008ffb;--brand-hover:#35a7ff;--brand-1200:#005aa5;
  --primary:#005aa5;--primary-hover:#00396c;
  --secondary:#262b34;--secondary-hover:#3e4655;--secondary-active:#566277;
  --ghost-hover:#3e4655;
  --destructive:#c82221;--destructive-ghost:#e24040;
  --focus-ring:#52b4ff;
  --success-bg:#1d320b;--success-content:#d7f6bb;
  --caution-bg:#605905;--caution-content:#fff4c4;
  --warning-bg:#320b1d;--warning-content:#f6bbd7;
  --error-bg:#320d0b;--error-content:#f6bbbb;
  --info-bg:#0b1532;--info-content:#bbccf6;
  --info-sec-bg:#0b3228;--info-sec-content:#bbf6e6;
  --card:#262b34;
  --font-sans:'Roboto',system-ui,-apple-system,sans-serif;
  --font-display:'Sora','Roboto',system-ui,sans-serif;
  --radius:8px;--radius-lg:12px;--radius-pill:9999px;
}
html{height:100%}
body{
  font-family:var(--font-sans);background:var(--surface-base);color:var(--text-primary);
  min-height:100vh;-webkit-font-smoothing:antialiased;line-height:1.5;
  
}
/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--surface-subtle)}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--border-ui)}

/* Layout */
#app{display:flex;flex-direction:column;min-height:100vh}
.header{background:var(--surface-emphasis);border-bottom:1px solid var(--border-subtle);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.header-left{display:flex;align-items:center;gap:12px}
.header-icon{width:36px;height:36px;border-radius:10px;background:var(--brand);display:flex;align-items:center;justify-content:center;font-size:18px}
.header h1{font-size:18px;font-weight:600;font-family:var(--font-display);letter-spacing:-0.3px;margin:0}
.header p{font-size:11px;color:var(--text-tertiary);margin:0}
.header-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

.tab-bar{display:flex;background:var(--surface-subtle);border-bottom:1px solid var(--border-subtle);padding:0 24px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab-bar::-webkit-scrollbar{height:0}
.tab-btn{padding:12px 20px;background:none;border:none;color:var(--text-tertiary);font-size:13px;font-weight:400;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;font-family:var(--font-sans);display:flex;align-items:center;gap:6px}
.tab-btn.active{color:var(--brand);font-weight:600;border-bottom-color:var(--brand)}
.tab-btn:hover:not(.active){color:var(--text-secondary)}
.tab-icon{font-size:10px;opacity:.7}
.tab-badge{font-size:10px;font-weight:700;background:var(--brand-1200);color:var(--text-primary);border-radius:var(--radius-pill);padding:1px 6px;margin-left:2px}

.main{display:flex;max-width:1280px;margin:0 auto;width:100%;flex:1}
.content{flex:1;padding:28px;min-width:0;padding-bottom:72px}

.preview-panel{width:500px;border-left:1px solid var(--border-subtle);background:var(--surface-subtle);padding:20px;overflow-y:auto;max-height:calc(100vh - 110px);position:sticky;top:0}
.preview-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.preview-header h3{font-size:13px;font-weight:600;color:var(--text-tertiary);font-family:var(--font-display);letter-spacing:.5px;text-transform:uppercase}
.preview-pre{font-size:11px;color:var(--text-secondary);white-space:pre-wrap;word-break:break-word;font-family:'SF Mono','Fira Code','Consolas',monospace;line-height:1.6;background:var(--surface-medium);border-radius:10px;padding:16px;border:1px solid var(--border-subtle);margin:0}

.footer{position:fixed;bottom:0;left:0;right:0;background:var(--surface-emphasis);border-top:1px solid var(--border-subtle);padding:8px 24px;display:flex;gap:20px;align-items:center;font-size:12px;color:var(--text-tertiary);z-index:10}
.footer-sep{color:var(--border-strong)}

/* Section */
.section{margin-bottom:32px}
.section h3{font-size:20px;font-weight:600;color:var(--text-primary);font-family:var(--font-display);margin:0 0 2px}
.section .subtitle{font-size:13px;color:var(--text-tertiary);margin:0 0 14px;line-height:1.4}

/* Form elements */
.field{margin-bottom:12px}
.field.small{margin-bottom:8px}
.field label{display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:5px;font-weight:500;letter-spacing:.2px}
.field input,.field textarea,.field select{
  width:100%;padding:10px 12px;background:transparent;border:1px solid var(--border-data-entry);
  border-radius:var(--radius);color:var(--text-primary);font-size:14px;font-family:var(--font-sans);
  outline:none;transition:border-color .15s,box-shadow .15s;line-height:1.4;
}
.field.small input,.field.small textarea{padding:7px 12px}
.field textarea{resize:vertical}
.field input::placeholder,.field textarea::placeholder{color:var(--text-placeholder)}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--focus-ring);box-shadow:0 0 0 2px rgba(82,180,255,.2)}
.field select option{background:var(--surface-emphasis)}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}

/* Buttons */
.btn{
  padding:8px 16px;border:none;border-radius:var(--radius);cursor:pointer;font-size:14px;font-weight:500;
  font-family:var(--font-sans);display:inline-flex;align-items:center;gap:6px;transition:background .15s,color .15s;
}
.btn.sm{padding:5px 12px;font-size:12px}
.btn-primary{background:var(--primary);color:var(--text-primary)}.btn-primary:hover{background:var(--primary-hover)}
.btn-secondary{background:var(--secondary);color:var(--text-primary)}.btn-secondary:hover{background:var(--secondary-hover)}
.btn-ghost{background:transparent;color:var(--text-secondary)}.btn-ghost:hover{background:var(--ghost-hover);color:var(--text-primary)}
.btn-brand{background:var(--brand);color:var(--text-primary)}.btn-brand:hover{background:var(--brand-hover)}
.btn-danger{background:var(--destructive);color:var(--text-primary)}.btn-danger:hover{background:#941e1b}
.btn-remove{background:none;border:none;color:var(--text-tertiary);cursor:pointer;font-size:18px;padding:0 4px;transition:color .15s;line-height:1}
.btn-remove:hover{color:var(--destructive-ghost)}

/* Cards */
.card{background:var(--surface-emphasis);border-radius:var(--radius-lg);padding:16px;border:1px solid var(--border-subtle)}
.card-scenario{margin-bottom:14px}
.card-need{margin-bottom:12px;transition:border-color .2s}

/* Weight slider */
.weight-row{display:flex;align-items:center;gap:10px;min-width:210px}
.weight-row input[type=range]{flex:1;height:4px}
.weight-badge{font-size:12px;font-weight:600;padding:3px 10px;border-radius:var(--radius-pill);min-width:90px;text-align:center;white-space:nowrap}

/* Profile slider */
.profile-slider{display:flex;align-items:center;gap:14px;margin-bottom:10px}
.profile-slider label{font-size:13px;color:var(--text-secondary);font-weight:600;min-width:170px}
.profile-slider input[type=range]{flex:1;height:4px}
.profile-value{font-size:13px;font-weight:700;color:var(--brand);background:var(--info-bg);border-radius:6px;padding:3px 10px;min-width:44px;text-align:center}

/* Scenario badge */
.scenario-badge{font-size:12px;font-weight:600;color:var(--brand);background:var(--info-bg);padding:3px 10px;border-radius:var(--radius-pill)}

/* Checkboxes */
.factor-group{margin-bottom:32px}
.factor-group-header{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.factor-group-header h4{font-size:16px;font-weight:600;font-family:var(--font-display);margin:0}
.factor-group-desc{font-size:12px;color:var(--text-tertiary);margin:0 0 12px;line-height:1.4}
.factor-count{font-size:11px;font-weight:700;border-radius:var(--radius-pill);padding:2px 8px}
.factor-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.factor-item{border-radius:10px;padding:10px 14px;cursor:pointer;transition:all .2s;border:1px solid var(--border-subtle);background:transparent}
.factor-item.checked{border-color:currentColor}
.factor-row{display:flex;align-items:center;gap:10px}
.factor-check{width:18px;height:18px;border-radius:4px;border:2px solid var(--border-data-entry);display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.factor-check.on{border-color:currentColor;background:currentColor}
.factor-label{font-size:14px;flex:1}
.factor-info-btn{background:none;border:none;color:var(--text-tertiary);cursor:pointer;font-size:11px;padding:2px 6px;border-radius:4px;opacity:.6}
.factor-info-btn:hover{opacity:1}
.factor-detail{font-size:12px;color:var(--text-tertiary);margin:8px 0 0 28px;line-height:1.5}

/* Anti-goal row */
.anti-goal-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.anti-goal-prefix{color:var(--text-tertiary);font-size:12px;font-weight:500;white-space:nowrap}

/* Responsive */
@media(max-width:900px){
  .main{flex-direction:column}
  .preview-panel{width:100%;max-height:50vh;position:static;border-left:none;border-top:1px solid var(--border-subtle)}
  .factor-grid{grid-template-columns:1fr}
  .grid-3{grid-template-columns:1fr 1fr}
}
@media(max-width:600px){
  .header{padding:12px 16px}
  .tab-bar{padding:0 12px}
  .content{padding:20px 16px;padding-bottom:72px}
  .grid-2,.grid-3{grid-template-columns:1fr}
  .footer{padding:8px 16px;gap:12px;font-size:11px;flex-wrap:wrap}
}

.hidden{display:none!important}
</style>
</head>
<body>
<div id="app">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="header-icon">👤</div>
      <div>
        <h1>Persona Generator</h1>
        <p>Export .md optimized for Claude Code</p>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn btn-ghost" id="btnPreview">Preview .md</button>
      <button class="btn btn-secondary" id="btnCopy">Copy</button>
      <button class="btn btn-brand" id="btnExport">Export .md</button>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tab-bar" id="tabBar"></div>

  <!-- Main -->
  <div class="main">
    <div class="content" id="content"></div>
    <div class="preview-panel hidden" id="previewPanel">
      <div class="preview-header">
        <h3>Markdown Preview</h3>
        <button class="btn btn-ghost sm" id="btnCopyPreview">Copy</button>
      </div>
      <pre class="preview-pre" id="previewPre"></pre>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <span id="footerName">No name set</span>
    <span class="footer-sep">|</span>
    <span id="footerNeeds">0 needs</span>
    <span class="footer-sep">|</span>
    <span id="footerFactors">0 human factors</span>
    <span class="footer-sep">|</span>
    <span id="footerScenarios">0 scenarios</span>
    <div style="flex:1"></div>
    <span style="font-size:11px">DroneSense Design System</span>
  </div>
</div>

<script>
// ============================================================
// STATE
// ============================================================
const WEIGHT_LABELS={1:"Nice to have",2:"Low",3:"Medium",4:"High",5:"Critical"};
const WEIGHT_COLORS={1:"#636f87",2:"#52b4ff",3:"#fff4c4",4:"#fb923c",5:"#e24040"};
const WEIGHT_BG={1:"#21252e",2:"#0b1532",3:"#605905",4:"#7b1a18",5:"#320d0b"};
const CLASSIFICATIONS=["CORE USER","SECONDARY USER","TERTIARY USER","STAKEHOLDER"];

const HUMAN_FACTORS={
  environmental:{
    label:"Environmental Factors",icon:"🌦",
    description:"Physical conditions the user operates in that affect device interaction, visibility, and physical comfort.",
    color:"#bbf6e6",bg:"#0b3228",
    items:[
      {id:"extreme_heat",label:"Extreme heat",detail:"Prolonged sun exposure, hot surfaces, sweat on hands/screens. Devices may overheat and throttle. Screen readability degrades. Dehydration affects cognition."},
      {id:"extreme_cold",label:"Extreme cold",detail:"Reduced finger dexterity, touchscreen responsiveness drops, battery drain accelerates significantly. Breath fog on close screens."},
      {id:"rain_moisture",label:"Rain / moisture",detail:"Wet screens register phantom touches, grip on devices becomes unreliable. Water ingress risk on non-ruggedized hardware."},
      {id:"bright_sunlight",label:"Bright sunlight / glare",detail:"Screen washout makes feeds and text unreadable. Forces users to shield screens, reducing grip stability. Requires high-contrast or outdoor-mode UI."},
      {id:"low_light_darkness",label:"Low light / darkness",detail:"Dark mode essential to preserve night-adapted vision. Bright UI elements cause temporary blindness and compromise tactical awareness."},
      {id:"wind_dust",label:"High wind / dust / debris",detail:"Airborne particles obscure screens, make voice communication difficult, increase drone operational risk. Fine particles infiltrate device ports."},
      {id:"noise",label:"High ambient noise",detail:"Sirens, engines, crowds, gunfire — audio alerts become useless. Radio comms require earpieces. Voice-based interactions fail entirely."},
      {id:"confined_space",label:"Confined or cramped space",detail:"Vehicle cabs, command posts, aircraft. Limited arm movement, restricted screen angles. Must operate with elbows tucked."},
      {id:"moving_vehicle",label:"Moving vehicle / vibration",detail:"Bouncing, vibration, and sudden stops degrade fine motor control. Touchscreen accuracy drops. Motion sickness risk with prolonged screen use."},
      {id:"low_connectivity",label:"Low / intermittent connectivity",detail:"Cellular dead zones, saturated networks at large incidents. App must degrade gracefully — queue actions, cache data, show connection state clearly."},
      {id:"altitude_pressure",label:"Altitude / pressure changes",detail:"Mountain operations, helicopter support. Thinner air affects cognitive performance and device barometric sensors."},
      {id:"hazmat_environment",label:"Hazardous material environment",detail:"Chemical, biological, radiological scenes. Full PPE including SCBA masks restrict vision and device interaction. Decontamination affects equipment."},
    ]
  },
  accessibility:{
    label:"Accessibility & Physical Factors",icon:"🧤",
    description:"Physical constraints on how the user can interact with devices, including protective equipment and body position.",
    color:"#fff4c4",bg:"#605905",
    items:[
      {id:"gloved_hands",label:"Wearing gloves (tactical, medical, thermal)",detail:"Reduced finger precision, touchscreen may not register through non-conductive gloves. Requires large touch targets (min 44px), gesture-based nav, and minimal fine-motor interactions."},
      {id:"one_handed",label:"One-handed operation",detail:"Other hand holding radio, flashlight, weapon, door handle, or patient. All critical actions must be reachable with a single thumb on a phone-sized screen."},
      {id:"arms_encumbered",label:"Arms encumbered / carrying gear",detail:"Body armor, duty belt, medical kit, fire hose — limits arm range of motion and how the device can be held or positioned."},
      {id:"mask_facepiece",label:"Wearing mask / face shield / SCBA",detail:"Field of vision narrowed, face ID and voice input unusable. Can't bring device close to face. Breathing apparatus adds auditory isolation."},
      {id:"eye_protection",label:"Eye protection / tinted visor",detail:"Safety glasses, ballistic eyewear, tinted visors reduce screen clarity and color perception. High-contrast UI becomes essential."},
      {id:"hearing_protection",label:"Hearing protection / earpieces",detail:"Earplugs, over-ear protection, or radio earpieces. Audio alerts may not be heard. Haptic feedback becomes critical for confirmations."},
      {id:"prone_kneeling",label:"Non-standing position (kneeling, prone, seated)",detail:"Device angle and arm reach change dramatically. Screens must be readable at oblique angles. Wrist-mounted displays become preferable."},
      {id:"limited_vision",label:"Limited vision (smoke, fog, NVGs)",detail:"Night vision goggles wash out bright screens. Smoke reduces visibility to inches. UI must function with minimal visual confirmation."},
      {id:"fatigue_tremor",label:"Physical fatigue / tremor",detail:"Extended operations, adrenaline crash, or physical exertion cause hand tremor. Touch targets and gesture sensitivity must accommodate imprecise input."},
      {id:"wet_sweaty_hands",label:"Wet or sweaty hands",detail:"Touchscreen swipe and tap accuracy degrades. Device grip becomes unreliable. Capacitive screens may register false inputs."},
    ]
  },
  psychological:{
    label:"Psychological & Cognitive Factors",icon:"🧠",
    description:"Mental states and cognitive conditions that affect attention, decision-making, information processing, and error rates.",
    color:"#f6bbd7",bg:"#320b1d",
    items:[
      {id:"acute_stress",label:"Acute stress / life-threatening situation",detail:"Fight-or-flight response active. Fine motor skills degrade, tunnel vision occurs, auditory exclusion is common. Users revert to simplest, most familiar interface patterns. Multi-step workflows get abandoned."},
      {id:"cognitive_overload",label:"Cognitive overload / information saturation",detail:"Too many simultaneous data streams — radio, video, map, text, environmental cues. Working memory is full. Users fixate on one source and miss critical changes elsewhere."},
      {id:"vigilance_fatigue",label:"Vigilance fatigue / monitoring fatigue",detail:"Extended monitoring causes 'video-blindness' after 20-40 minutes. Detection rates drop to 50%. 50% of operators disengage within 30 minutes of a 90-minute monitoring task."},
      {id:"decision_fatigue",label:"Decision fatigue",detail:"After hours of rapid decisions, quality degrades. Users default to path of least resistance or defer decisions entirely. End-of-shift logging suffers most."},
      {id:"time_pressure",label:"Severe time pressure",detail:"Seconds matter — response time benchmarks are 60-100 seconds. Every UI step that adds delay is directly measurable in outcome quality. Users will skip anything non-essential."},
      {id:"split_attention",label:"Divided / split attention",detail:"Simultaneously managing radio comms, physical environment, team coordination, and device interface. The device is not their primary focus — it's a secondary or tertiary attention stream."},
      {id:"vicarious_trauma",label:"Vicarious trauma / disturbing content",detail:"Viewing violent crimes, accidents, injuries, and death through high-definition feeds. Causes physiological stress responses, intrusive thoughts. The 'deployed-in-garrison' problem — shifting from crisis to normal life within hours."},
      {id:"boredom_monotony",label:"Boredom / monotony between events",detail:"Long periods of low activity punctuated by sudden high-urgency events. The shift from boredom to crisis is instant. Alerting and escalation design must bridge this gap."},
      {id:"external_pressure",label:"External organizational / political pressure",detail:"Awareness that actions are being recorded, reviewed, or politically scrutinized. Creates hesitation, over-caution, or performance anxiety that slows natural workflows."},
      {id:"unfamiliarity",label:"Unfamiliarity with system / infrequent use",detail:"Collateral-duty users may not touch the system for weeks between uses. Interface must be re-learnable in seconds, not require recall of training. Progressive disclosure over feature density."},
      {id:"multi_role",label:"Role-switching / multi-tasking between duties",detail:"91% of drone pilots serve in collateral roles. Must mentally switch between primary duty and drone operation under time pressure. Context-switching is cognitively expensive."},
      {id:"confirmation_bias",label:"Confirmation bias risk",detail:"Users interpreting ambiguous imagery (video feeds, thermal) tend to see what they expect. Design should present objective data and avoid reinforcing initial assumptions."},
      {id:"attentional_tunneling",label:"Attentional tunneling on video/screen",detail:"Drone video dominates attention — nearly all incident commanders in studies failed to detect important changes from other data sources because the video feed captured their focus."},
    ]
  }
};

let state = {
  name:"",id:"",role:"",classification:"CORE USER",icon:"",
  description:"",
  needs:[{text:"",weight:3,description:""},{text:"",weight:3,description:""},{text:"",weight:3,description:""}],
  context:"",
  techProficiency:5,techProficiencyNote:"",
  riskTolerance:5,riskToleranceNote:"",
  stressLevel:5,stressLevelNote:"",
  decisionSpeed:"",adoptionAttitude:"",primaryMotivation:"",secondaryMotivation:"",
  scenarios:[{trigger:"",goal:"",current_pain:"",ideal_experience:""}],
  antiGoals:[""],
  vocabulary:"",wishList:"",
  humanFactors:{environmental:[],accessibility:[],psychological:[]},
  humanFactorsCustom:{environmental:"",accessibility:"",psychological:""}
};

let currentTab = "basics";
let showPreview = false;
let expandedFactors = {};

// ============================================================
// TABS
// ============================================================
const TABS=[
  {key:"basics",label:"Basics",icon:"◉"},
  {key:"needs",label:"Needs & Weights",icon:"◈"},
  {key:"profile",label:"Profile",icon:"◎"},
  {key:"human",label:"Human Factors",icon:"⚠"},
  {key:"scenarios",label:"Scenarios",icon:"▶"},
  {key:"extras",label:"Anti-Goals & More",icon:"◇"},
  {key:"prompt",label:"AI Prompt",icon:"✦"}
];

function renderTabs(){
  const bar=document.getElementById("tabBar");
  const totalFactors=Object.values(state.humanFactors).reduce((s,a)=>s+a.length,0);
  bar.innerHTML=TABS.map(t=>{
    const active=currentTab===t.key;
    let badge="";
    if(t.key==="human"&&totalFactors>0) badge=`<span class="tab-badge">${totalFactors}</span>`;
    return `<button class="tab-btn${active?" active":""}" data-tab="${t.key}"><span class="tab-icon">${t.icon}</span>${t.label}${badge}</button>`;
  }).join("");
  bar.querySelectorAll(".tab-btn").forEach(b=>b.addEventListener("click",()=>{currentTab=b.dataset.tab;render();}));
}

// ============================================================
// MARKDOWN GENERATION
// ============================================================
function generateMarkdown(){
  const p=state;
  const sorted=[...p.needs].sort((a,b)=>b.weight-a.weight);
  const wd=sorted.filter(n=>n.text.trim()).map(n=>`  - weight: ${n.weight}/5 (${WEIGHT_LABELS[n.weight]})\n    need: "${n.text}"${n.description?`\n    context: "${n.description}"`:""}`).join("\n");
  const sy=p.scenarios.filter(s=>s.trigger.trim()).map(s=>`  - trigger: ${s.trigger}\n    goal: ${s.goal}\n    current_pain: ${s.current_pain}\n    ideal_experience: ${s.ideal_experience}`).join("\n\n");
  const ag=p.antiGoals.filter(a=>a.trim()).map(a=>`- Does NOT want ${a}`).join("\n");

  let hf="";
  const cats=Object.entries(HUMAN_FACTORS);
  const hasAny=cats.some(([k])=>(p.humanFactors[k]||[]).length>0||(p.humanFactorsCustom[k]||"").trim());
  if(hasAny){
    hf=`\n## Human Factors & Constraints\n\n> **AI Design Directive:** The following human factors are active constraints for this persona. Every UI element, interaction pattern, and information display must be evaluated against these factors. If a design decision would fail under any of these conditions, it must be flagged or redesigned. These are not edge cases — they are the expected operating conditions.\n\n`;
    for(const[ck,cat]of cats){
      const sel=p.humanFactors[ck]||[];
      const cust=(p.humanFactorsCustom[ck]||"").trim();
      if(!sel.length&&!cust) continue;
      hf+=`### ${cat.icon} ${cat.label}\n\n\`\`\`yaml\n${ck}_factors:\n`;

function esc(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML;}

function fieldHTML(id,label,value,opts={}){
  const{multi,small,placeholder=""}=opts;
  const cls=small?"field small":"field";
  const tag=multi?`<textarea id="${id}" rows="3" placeholder="${esc(placeholder)}">${esc(value)}</textarea>`
    :`<input id="${id}" value="${esc(value)}" placeholder="${esc(placeholder)}">`;
  return `<div class="${cls}">${label?`<label>${esc(label)}</label>`:""}${tag}</div>`;
}

function bindField(id,key,sub){
  const el=document.getElementById(id);

}

function bindFieldIdx(id,arr,idx,field){

}

function render(){

  const renderers={basics:renderBasics,needs:renderNeeds,profile:renderProfile,human:renderHuman,scenarios:renderScenarios,extras:renderExtras,prompt:renderPrompt};

  const binders={basics:bindBasics,needs:bindNeeds,profile:bindProfile,human:bindHuman,scenarios:bindScenarios,extras:bindExtras,prompt:bindPrompt};
  binders[currentTab]();
  updateFooter();
  updatePreview();
}

function updatePreview(){
  if(!showPreview) return;
  document.getElementById("previewPre").textContent=generateMarkdown();
}

function updateFooter(){
  const fn=state.needs.filter(n=>n.text.trim()).length;
  const fs=state.scenarios.filter(s=>s.trigger.trim()).length;
  const ff=Object.values(state.humanFactors).reduce((s,a)=>s+a.length,0);
  document.getElementById("footerName").textContent=state.name?`📋 ${state.name}`:"No name set";
  document.getElementById("footerName").style.color=state.name?"var(--success-content)":"var(--text-tertiary)";
  document.getElementById("footerNeeds").textContent=`${fn} need${fn!==1?"s":""}`;
  document.getElementById("footerFactors").textContent=`${ff} human factor${ff!==1?"s":""}`;
  document.getElementById("footerScenarios").textContent=`${fs} scenario${fs!==1?"s":""}`;
}

function togglePreview(){
  showPreview=!showPreview;
  document.getElementById("previewPanel").classList.toggle("hidden",!showPreview);
  document.getElementById("btnPreview").textContent=showPreview?"Hide Preview":"Preview .md";
  if(showPreview) updatePreview();
}

function copyMd(){
  navigator.clipboard.writeText(generateMarkdown()).then(()=>{
    const b=document.getElementById("btnCopy");b.textContent="✓ Copied";setTimeout(()=>b.textContent="Copy",2000);
  }).catch(()=>{});
}

function exportMd(){
  const md=generateMarkdown();
  const blob=new Blob([md],{type:"text/markdown"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download=`persona-${state.id||"unnamed"}.md`;a.click();
  URL.revokeObjectURL(url);
}

document.getElementById("btnCopy").addEventListener("click",copyMd);

## Who is this user?

The Field Pilot is a sworn law enforcement officer or firefighter who has been collateral-duty certified to operate a drone at emergency incidents. They are not a dedicated UAV specialist — drone operation is one of many responsibilities they carry on any given shift. They are highly skilled in their primary discipline but interact with the drone software intermittently, often weeks apart between activations. When they do fly, conditions are rarely ideal.

> **AI Decision-Making Directive:** When making design, feature, or implementation decisions that affect this persona, use the weight values below to prioritize. Weight 5 needs should never be compromised for lower-weight needs. Weight 1–2 needs are acceptable to deprioritize when they conflict with higher-weight needs. When two needs conflict, the higher weight wins.

## User Context

Field Pilots are activated at outdoor incident scenes — structure fires, search operations, traffic accidents, civil unrest. They operate a tablet or phone-based ground control station while standing, often in partial PPE. Connectivity is unreliable at large incidents where cellular networks are saturated. The drone system is one of several pieces of active technology they are managing, and ambient noise, movement, and urgency are the norm, not the exception.

stress_level_during_use: 9/10 — Activations happen during active, high-stakes incidents. Cognitive and physical load is at or near maximum.
decision_speed: Seconds to minutes
adoption_attitude: Pragmatic majority — will adopt if it demonstrably helps the mission, skeptical of tools that add process
